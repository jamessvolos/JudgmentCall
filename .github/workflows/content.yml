# Content pipeline: ingest real public data as submitted findings, then
# optionally generate their six tellings with the Anthropic API (needs
# ANTHROPIC_API_KEY). Sources: SEC EDGAR (no key), World Bank Open Data (no
# key), ECB reference rates via Frankfurter (no key), and FRED (needs
# FRED_API_KEY). Findings are activated straight to the live pool (no approval
# gate). SEC named-entity findings never receive an overclaimed telling; the
# macro/econ sources do, exactly like FRED (the overclaim lives in language,
# never in a fabricated fact — see src/lib/generation/planner.ts).
name: Content pipeline

on:
  workflow_dispatch:
    inputs:
      sec_ciks:
        description: "Space-separated SEC CIKs to ingest (default: Apple, Microsoft, Alphabet, NVIDIA, Amazon, Walmart, Tesla, Meta, JPMorgan, Coca-Cola, Costco, Ford)"
        default: "0000320193 0000789019 0001652044 0001045810 0001018724 0000104169 0001318605 0001326801 0000019617 0000021344 0000909832 0000037996"
      fred_series:
        description: "Space-separated FRED series (needs FRED_API_KEY secret)"
        default: "CPIAUCSL UNRATE FEDFUNDS"
      worldbank_series:
        description: "Space-separated ISO3:INDICATOR tokens, World Bank Open Data (public, no key)"
        default: "USA:NY.GDP.MKTP.KD.ZG CHN:NY.GDP.MKTP.KD.ZG IND:FP.CPI.TOTL.ZG USA:SL.UEM.TOTL.ZS GBR:FP.CPI.TOTL.ZG DEU:NE.EXP.GNFS.ZS BRA:NY.GDP.PCAP.CD JPN:SP.POP.TOTL"
      frankfurter_pairs:
        description: "Space-separated BASE:QUOTE FX pairs, ECB reference rates via Frankfurter (public, no key)"
        default: "USD:EUR USD:JPY USD:GBP EUR:JPY USD:CHF"
      run_generate:
        description: "Generate variants for submitted findings (needs ANTHROPIC_API_KEY secret)"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: content
  cancel-in-progress: false

jobs:
  content:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Guard — secrets present
        env:
          D: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$D" ]; then
            echo "::error::Missing repo secret DATABASE_URL."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: claude/judgment-call-spec-r02iib

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Postgres client
        run: |
          sed 's/provider = "sqlite"/provider = "postgresql"/' prisma/schema.prisma > prisma/postgres/schema.prisma
          npx prisma generate --schema prisma/postgres/schema.prisma

      - name: Ingest SEC EDGAR filings
        if: inputs.sec_ciks != ''
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEC_CONTACT: ${{ secrets.SEC_CONTACT }}
        run: |
          for cik in ${{ inputs.sec_ciks }}; do
            echo "--- EDGAR $cik"
            npx tsx scripts/ingest.ts edgar "$cik" || echo "::warning::EDGAR ingest failed for $cik"
            sleep 1  # SEC fair-access pacing
          done

      - name: Ingest FRED series
        if: inputs.fred_series != ''
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ -z "$FRED_API_KEY" ]; then
            echo "::notice::FRED_API_KEY secret not set — skipping FRED ingest (get a free key at fred.stlouisfed.org)."
            exit 0
          fi
          for series in ${{ inputs.fred_series }}; do
            echo "--- FRED $series"
            npx tsx scripts/ingest.ts fred "$series" || echo "::warning::FRED ingest failed for $series"
          done

      - name: Ingest World Bank indicators
        if: inputs.worldbank_series != ''
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          for tok in ${{ inputs.worldbank_series }}; do
            country="${tok%%:*}"; indicator="${tok#*:}"
            echo "--- WorldBank $country $indicator"
            npx tsx scripts/ingest.ts worldbank "$country" "$indicator" || echo "::warning::World Bank ingest failed for $tok"
            sleep 1
          done

      - name: Ingest ECB FX reference rates (Frankfurter)
        if: inputs.frankfurter_pairs != ''
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          for tok in ${{ inputs.frankfurter_pairs }}; do
            base="${tok%%:*}"; quote="${tok#*:}"
            echo "--- FX $base/$quote"
            npx tsx scripts/ingest.ts frankfurter "$base" "$quote" || echo "::warning::FX ingest failed for $tok"
            sleep 1
          done

      - name: Dedupe unstarted submitted findings
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx scripts/dedupe-submitted.ts

      - name: Generate tellings for submitted findings
        if: inputs.run_generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::notice::ANTHROPIC_API_KEY secret not set — skipping generation. Findings remain submitted; re-run once the key is added."
            exit 0
          fi
          npx tsx scripts/generate.ts --submitted

      # No human review gate: promote anything still pending/submitted so real
      # data serves immediately. Idempotent; never touches rejected variants.
      # Runs even if generation failed partway (out of API credits, a timeout,
      # one bad finding) so every finding that DID generate still goes live
      # instead of being stranded behind the failed step.
      - name: Activate content (no approval gate)
        if: ${{ !cancelled() }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx tsx scripts/activate-content.ts

      - name: Queue summary
        if: ${{ !cancelled() }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          npx tsx -e "
          import { PrismaClient } from '@prisma/client';
          const p = new PrismaClient();
          (async () => {
            const active = await p.finding.count({ where: { status: 'active' } });
            const approved = await p.variant.count({ where: { status: 'approved' } });
            const pending = await p.variant.count({ where: { status: 'pending' } });
            console.log(\`active findings: \${active} · approved variants: \${approved} · still pending: \${pending}\`);
            await p.\$disconnect();
          })();
          "
